name: Build desktop apps

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-13
            script: dist:mac
            artifact: hamster-pet-macos
            artifact_path: |
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml
          - name: Windows
            os: windows-latest
            script: dist:win
            artifact: hamster-pet-windows
            artifact_path: |
              release/*.exe
              release/*.blockmap
              release/latest.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify GitHub token is available
        run: node -e "if (!process.env.GH_TOKEN) throw new Error('GH_TOKEN repository secret is not available to this workflow run')"

      - name: Build package
        run: npm run ${{ matrix.platform.script }} -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: ${{ matrix.platform.artifact_path }}
          if-no-files-found: error
          retention-days: 14
